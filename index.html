<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>uk garage not farage</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video id="bgVideo" autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

<!-- 🖼 IMAGE BACKGROUND -->
<div id="bgImage"></div>

<!-- 🎛 MIXER UI -->
<div id="ui">

    <h1>DJ MIXER</h1>

    <button id="playA">PLAY A</button>
    <button id="playB">PLAY B</button>

    <input id="crossfader" type="range" min="0" max="100" value="50">

    <div id="labels">
        <span>TRACK A</span>
        <span>TRACK B</span>
    </div>

</div>

<!-- 🎵 AUDIO -->
<audio id="trackA" src="track1.mp3"></audio>
<audio id="trackB" src="track2.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
