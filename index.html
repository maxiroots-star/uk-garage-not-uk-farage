<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIGEL GARAGE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

<div id="bgImage"></div>

<div id="waveform"></div>

<div id="ui">

    <h1>NIGEL GARAGE</h1>

    <button id="playA">TRACK 1</button>
    <button id="playB">TRACK 2</button>

    <div class="sliderLabel">CROSSFADER</div>
    <input id="crossfader" type="range" min="0" max="100" value="50">

    <div class="sliderLabel">FILTER</div>
    <input id="filter" type="range" min="0" max="100" value="0">

</div>

<audio id="trackA" src="track1.mp3"></audio>
<audio id="trackB" src="track2.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
